<nav
  aria-label="Navegación principal"
  class="flex flex-wrap items-center gap-x-6 gap-y-4 border-b border-neutral-800 bg-neutral-950 px-6 py-4"
>
  <!-- Logo -->
  <a
    routerLink="/"
    aria-label="Dragon Ball Z - inicio"
    class="shrink-0 rounded-lg focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-yellow-400"
  >
    <img ngSrc="dragon-ball-logo.svg" width="138" height="40" priority alt="Dragon Ball Z" class="h-10 w-auto" />
  </a>

  <!-- Links -->
  <ul class="order-last flex w-full flex-wrap items-center justify-center gap-x-8 gap-y-2 sm:order-none sm:w-auto sm:flex-1">
    @for (item of navItems; track item.path) {
      <li>
        @if (item.enabled) {
          <a
            [routerLink]="item.path"
            routerLinkActive="text-yellow-400"
            class="rounded font-semibold text-white transition-colors hover:text-yellow-400 focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-yellow-400"
          >
            {{ item.label }}
          </a>
        } @else {
          <span aria-disabled="true" class="cursor-not-allowed font-semibold text-neutral-500">
            {{ item.label }}
          </span>
        }
      </li>
    }
  </ul>

  <!-- Acciones -->
  <div class="flex shrink-0 items-center gap-3">
    <!-- Búsqueda (solo visual) -->
    <label for="navbar-search" class="sr-only">Buscar personaje</label>
    <div class="relative">
      <svg
        aria-hidden="true"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        class="pointer-events-none absolute left-3 top-1/2 size-4 -translate-y-1/2 text-neutral-400"
      >
        <circle cx="11" cy="11" r="7" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input
        id="navbar-search"
        type="search"
        placeholder="Buscar personaje..."
        class="w-56 max-w-full rounded-lg border border-neutral-700 bg-neutral-800/60 py-2 pl-9 pr-3 text-sm text-white placeholder:text-neutral-400 focus-visible:border-yellow-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-yellow-400"
      />
    </div>

    <!-- Toggle tema (placeholder visual) -->
    <button
      type="button"
      aria-label="Cambiar tema"
      class="flex size-10 shrink-0 cursor-pointer items-center justify-center rounded-lg border border-neutral-700 bg-neutral-800/60 text-yellow-400 transition-colors hover:bg-neutral-700/60 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-yellow-400"
    >
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="size-5">
        <circle cx="12" cy="12" r="4" />
        <line x1="12" y1="2" x2="12" y2="4" />
        <line x1="12" y1="20" x2="12" y2="22" />
        <line x1="4.93" y1="4.93" x2="6.34" y2="6.34" />
        <line x1="17.66" y1="17.66" x2="19.07" y2="19.07" />
        <line x1="2" y1="12" x2="4" y2="12" />
        <line x1="20" y1="12" x2="22" y2="12" />
        <line x1="4.93" y1="19.07" x2="6.34" y2="17.66" />
        <line x1="17.66" y1="6.34" x2="19.07" y2="4.93" />
      </svg>
    </button>
  </div>
</nav>
