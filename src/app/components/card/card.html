<article
  class="relative flex w-full max-w-85 flex-col items-center gap-4 overflow-hidden rounded-3xl border border-neutral-800 bg-neutral-900/80 px-6 pb-6 pt-8 shadow-[0_0_30px_rgba(250,204,21,0.08)]"
>
  <div
    class="ring-animated group relative flex h-36 w-36 cursor-pointer items-center justify-center rounded-full border-4 border-yellow-500/60 shadow-[0_0_20px_rgba(234,179,8,0.45)]"
  >
    <div
      class="relative h-28 w-28 overflow-hidden rounded-full bg-black transition-[overflow] group-hover:overflow-visible"
    >
      <img
        [ngSrc]="character().image"
        [alt]="character().name"
        fill
        class="char-img object-contain object-center transition-transform duration-300 ease-out group-hover:-translate-y-3 group-hover:scale-[1.4]"
      />
    </div>

    @if (character().affiliation) {
      <span
        class="absolute bottom-0 right-0 translate-x-1 translate-y-1 rounded-full bg-linear-to-r from-green-400 to-emerald-500 px-3 py-1 text-xs font-semibold text-neutral-900 shadow"
      >
        {{ character().affiliation }}
      </span>
    }
  </div>

  <div class="flex flex-col items-center gap-1">
    <h3 class="w-full truncate text-center text-2xl font-extrabold tracking-wide text-white">
      {{ character().name }}
    </h3>
    <span aria-hidden="true" class="h-0.5 w-16 rounded bg-linear-to-r from-green-400 to-red-500"></span>
  </div>

  <div class="flex w-full flex-col gap-3">
    <div class="flex items-center gap-3 rounded-xl border border-neutral-700/50 bg-neutral-800/60 p-3">
      <span
        aria-hidden="true"
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-neutral-700/50 text-lg"
        >⚡</span
      >
      <div class="flex flex-col">
        <span class="text-xs font-medium uppercase tracking-wide text-neutral-400">Ki Power</span>
        <span class="text-lg font-bold text-white">{{ character().ki }}</span>
      </div>
    </div>

    <div class="flex items-center gap-3 rounded-xl border border-neutral-700/50 bg-neutral-800/60 p-3">
      <span
        aria-hidden="true"
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-neutral-700/50 text-lg"
        >🔥</span
      >
      <div class="flex flex-col">
        <span class="text-xs font-medium uppercase tracking-wide text-neutral-400">Ki Máximo</span>
        <span class="text-lg font-bold text-white">{{ character().maxKi }}</span>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div class="flex items-center gap-3 rounded-xl border border-neutral-700/50 bg-neutral-800/60 p-3">
        <span
          aria-hidden="true"
          class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-neutral-700/50 text-lg"
          >🌐</span
        >
        <div class="flex flex-col">
          <span class="text-xs font-medium uppercase tracking-wide text-neutral-400">Raza</span>
          <span class="truncate text-sm font-bold text-white">{{ character().race }}</span>
        </div>
      </div>

      <div class="flex items-center gap-3 rounded-xl border border-neutral-700/50 bg-neutral-800/60 p-3">
        <span
          aria-hidden="true"
          class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-neutral-700/50 text-lg"
          >⚧</span
        >
        <div class="flex flex-col">
          <span class="text-xs font-medium uppercase tracking-wide text-neutral-400">Género</span>
          <span class="truncate text-sm font-bold text-white">{{ character().gender }}</span>
        </div>
      </div>
    </div>
  </div>
</article>
